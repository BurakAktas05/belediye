# ============================================================
#  Uygulama Adı
# ============================================================
spring.application.name=BelediyeApp

# ============================================================
#  Veritabanı (PostgreSQL + PostGIS)
#  Gerçek değerler .env veya Railway/Docker secrets'tan gelir
# ============================================================
spring.datasource.url=jdbc:postgresql://localhost:5432/belediyeapp
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver

# Bağlantı havuzu (HikariCP)
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.connection-timeout=30000

# ============================================================
#  JPA / Hibernate
# ============================================================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.show-sql=false

# ============================================================
#  Flyway (DB Migration)
# ============================================================
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true

# ============================================================
#  JWT Ayarları
#  Üretim ortamında .env ile override edilmeli!
# ============================================================
app.security.jwt.secret=${JWT_SECRET:dGhpcyBpcyBhIHZlcnkgbG9uZyBzZWNyZXQga2V5Zm9yIElCQiBiZWxlZGl5ZWFwcA==}
app.security.jwt.access-token-expiration-ms=900000
app.security.jwt.refresh-token-expiration-days=30

# ============================================================
#  Dosya Depolama — aşağıdaki app.storage.s3.* blokunda
# ============================================================

# ============================================================
#  Swagger UI / OpenAPI
# ============================================================
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.operationsSorter=method

# ============================================================
#  Loglama
# ============================================================
logging.level.com.burak.belediyeapp=INFO
logging.level.org.springframework.security=WARN
logging.level.org.flywaydb=INFO

# ============================================================
#  Async (NotificationService için)
# ============================================================
spring.task.execution.pool.core-size=3
spring.task.execution.pool.max-size=10
spring.task.execution.pool.queue-capacity=100

# ================================
#  STORAGE (Cloudflare R2)
# ================================
app.storage.s3.endpoint=${S3_ENDPOINT:https://account.r2.cloudflarestorage.com}
app.storage.s3.access-key=${S3_ACCESS_KEY:your-key}
app.storage.s3.secret-key=${S3_SECRET_KEY:your-secret}
app.storage.s3.bucket-name=${S3_BUCKET_NAME:belediye-reports}
app.storage.s3.region=${S3_REGION:auto}
app.storage.s3.public-url=${S3_PUBLIC_URL:https://pub.r2.dev}

# ================================
#  REDIS
# ================================
spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=${REDIS_PORT:6379}
spring.data.redis.password=${REDIS_PASSWORD:}

# ================================
#  AI (Google Gemini)
# ================================
app.ai.gemini.api-key=${GEMINI_API_KEY:}

# ================================
#  Medya doğrulama (Python media-guard servisi — boş bırakılırsa atlanır)
# ================================
app.media-guard.base-url=${MEDIA_GUARD_URL:}
app.media-guard.fail-open=${MEDIA_GUARD_FAIL_OPEN:true}
